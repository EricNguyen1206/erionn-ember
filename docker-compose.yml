version: "3.9"
services:
  ember:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080
      - CACHE_MAX_ELEMENTS=100000
      - CACHE_DEFAULT_TTL=3600
      # SimHash threshold: 0.85 → max 9 differing bits out of 64
      - CACHE_SIMILARITY_THRESHOLD=0.85
    restart: unless-stopped
