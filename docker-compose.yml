version: "3.9"
services:
  ember:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - HTTP_PORT=8080
      - GRPC_PORT=9090
      - CACHE_MAX_ELEMENTS=100000
      - CACHE_DEFAULT_TTL=3600
      # Default semantic similarity threshold.
      - CACHE_SIMILARITY_THRESHOLD=0.85
    restart: unless-stopped
