version: "3.9"
services:
  # ─── Erion Ember Cache Service ────────────────────────────────────────────
  ember:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080
      - CACHE_MAX_ELEMENTS=100000
      - CACHE_DEFAULT_TTL=3600
      - CACHE_SIMILARITY_THRESHOLD=0.85
      - EMBED_WORKERS=4
      # Semantic similarity via Ollama (pure Go HTTP, no CGO):
      #   1. Run: docker-compose --profile ollama up
      #   2. Pull: docker exec erion-ember-ollama-1 ollama pull nomic-embed-text
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=nomic-embed-text
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  # ─── Ollama (optional, enable for semantic similarity) ───────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]   # only starts with: docker-compose --profile ollama up
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
