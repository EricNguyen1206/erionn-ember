<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 630" width="100%" height="100%" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
    <!-- Glow effects -->
    <filter id="glow-http" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117" />

  <!-- Title -->
  <text x="425" y="55" fill="#c9d1d9" font-size="28" font-weight="bold" text-anchor="middle">Erionn Ember Architecture</text>
  <text x="425" y="80" fill="#8b949e" font-size="14" text-anchor="middle">Single-process Go Cache Server</text>

  <!-- Process Box -->
  <rect x="230" y="120" width="580" height="470" rx="12" fill="#161b22" stroke="#30363d" stroke-dasharray="8,8" stroke-width="2" />
  <text x="250" y="150" fill="#8b949e" font-size="14" font-weight="bold">Go Process</text>
  <text x="250" y="168" fill="#484f58" font-size="12">cmd/server</text>

  <!-- Client Box -->
  <rect x="20" y="280" width="140" height="80" rx="8" fill="#161b22" stroke="#238636" stroke-width="2" />
  <text x="90" y="325" fill="#c9d1d9" font-size="16" font-weight="bold" text-anchor="middle">Client Apps</text>

  <!-- HTTP Server Box -->
  <rect x="260" y="200" width="180" height="90" rx="8" fill="#0d1117" stroke="#8957e5" stroke-width="2" />
  <text x="350" y="235" fill="#8957e5" font-size="16" font-weight="bold" text-anchor="middle">HTTP Server</text>
  <text x="350" y="255" fill="#c9d1d9" font-size="12" text-anchor="middle">Health &amp; Ready Checks</text>
  <text x="350" y="275" fill="#484f58" font-size="11" text-anchor="middle">internal/server/http.go</text>

  <!-- gRPC Server Box -->
  <rect x="260" y="350" width="180" height="110" rx="8" fill="#0d1117" stroke="#2f81f7" stroke-width="2" />
  <text x="350" y="385" fill="#2f81f7" font-size="16" font-weight="bold" text-anchor="middle">gRPC Server</text>
  <text x="350" y="405" fill="#c9d1d9" font-size="12" text-anchor="middle">Data Commands</text>
  <text x="350" y="425" fill="#c9d1d9" font-size="12" text-anchor="middle">Pub/Sub Streams</text>
  <text x="350" y="445" fill="#484f58" font-size="11" text-anchor="middle">internal/server/grpc.go</text>

  <!-- Store Box -->
  <rect x="550" y="200" width="220" height="160" rx="8" fill="#0d1117" stroke="#d29922" stroke-width="2" />
  <text x="660" y="235" fill="#d29922" font-size="16" font-weight="bold" text-anchor="middle">In-Memory Store</text>
  <text x="570" y="265" fill="#c9d1d9" font-size="13">• Data types: Strings, Hashes</text>
  <text x="570" y="285" fill="#c9d1d9" font-size="13">• Data types: Lists, Sets</text>
  <text x="570" y="305" fill="#c9d1d9" font-size="13">• Mutex protected keyspace</text>
  <text x="570" y="325" fill="#c9d1d9" font-size="13">• TTL &amp; Lazy Eviction</text>
  <text x="660" y="348" fill="#484f58" font-size="11" text-anchor="middle">internal/store</text>

  <!-- PubSub Box -->
  <rect x="550" y="390" width="220" height="110" rx="8" fill="#0d1117" stroke="#f78166" stroke-width="2" />
  <text x="660" y="425" fill="#f78166" font-size="16" font-weight="bold" text-anchor="middle">Pub/Sub Hub</text>
  <text x="570" y="455" fill="#c9d1d9" font-size="13">• Channel Subscriptions</text>
  <text x="570" y="475" fill="#c9d1d9" font-size="13">• Fan-out architecture</text>
  <text x="660" y="493" fill="#484f58" font-size="11" text-anchor="middle">internal/pubsub</text>

  <!-- Connecting Lines -->
  <!-- Client to HTTP -->
  <path d="M 160 300 C 210 300, 210 245, 255 245" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)" />
  <text x="180" y="265" fill="#8b949e" font-size="12" text-anchor="middle">HTTP :8080</text>
  
  <!-- Client to gRPC -->
  <path d="M 160 340 C 210 340, 210 405, 255 405" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)" />
  <text x="180" y="380" fill="#8b949e" font-size="12" text-anchor="middle">gRPC :9090</text>
  
  <!-- gRPC to Store -->
  <path d="M 440 380 C 495 380, 495 280, 545 280" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)" />
  <text x="495" y="325" fill="#8b949e" font-size="12" text-anchor="middle">Mutate/Read</text>

  <!-- gRPC to PubSub -->
  <path d="M 440 425 C 495 425, 495 445, 545 445" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)" />
  <text x="495" y="420" fill="#8b949e" font-size="12" text-anchor="middle">Pub/Sub Streams</text>
  
</svg>
