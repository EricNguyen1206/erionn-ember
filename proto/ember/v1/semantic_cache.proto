syntax = "proto3";

package ember.v1;

option go_package = "github.com/EricNguyen1206/erion-ember/internal/gen/ember/v1;embv1";

message Namespace {
  string model = 1;
  string tenant_id = 2;
  string system_prompt_hash = 3;
}

message GetRequest {
  Namespace namespace = 1;
  string prompt = 2;
  float similarity_threshold = 3;
}

message GetResponse {
  bool hit = 1;
  string response = 2;
  float similarity = 3;
  bool exact_match = 4;
}

message SetRequest {
  Namespace namespace = 1;
  string prompt = 2;
  string response = 3;
  int64 ttl_seconds = 4;
}

message SetResponse {
  string id = 1;
}

message DeleteRequest {
  Namespace namespace = 1;
  string prompt = 2;
}

message DeleteResponse {
  bool deleted = 1;
}

message StatsRequest {
  Namespace namespace = 1;
}

message StatsResponse {
  int64 total_entries = 1;
  int64 cache_hits = 2;
  int64 cache_misses = 3;
  int64 total_queries = 4;
  double hit_rate = 5;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

service SemanticCacheService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Set(SetRequest) returns (SetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Stats(StatsRequest) returns (StatsResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}
