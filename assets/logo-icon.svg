<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Hexagon Shell -->
  <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="none" stroke="#d97706" stroke-width="2" />
  
  <!-- Inner Hexagon (The Core) -->
  <polygon points="50,15 82,32.5 82,67.5 50,85 18,67.5 18,32.5" fill="url(#glowGradient)" filter="url(#softGlow)" />
  
  <!-- The Spark (Ember) -->
  <path d="M50,35 L53,47 L65,50 L53,53 L50,65 L47,53 L35,50 L47,47 Z" fill="#ffffff" />
</svg>
